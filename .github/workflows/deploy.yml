name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.252.160
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/moni-beauty.com
            git pull origin main
            npm install
            cd frontend
            npm install
            npm run build
            cp -r dist/* /var/www/moni-beauty-frontend
            cd ..
            pm2 reload reports-backend
